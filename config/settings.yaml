# ========== 数据源 ==========
data:
  primary_source: akshare        # 主源：akshare + 东方财富
  fallback_sources:              # 降级源（使用与主源不同的 API 接口）
    - sina
  fetch_interval_seconds: 120    # 实时采集间隔（秒）
  fail_threshold: 3              # 连续失败 N 次降级
  fail_cooldown_seconds: 300     # 降级冷却时间
  cache_ttl_seconds: 120         # 实时数据缓存
  history_db: sqlite:///data/gugu.db
  parquet_dir: data/parquet

# ========== 策略 ==========
strategy:
  # 启用的策略列表（基于回测评估调整）
  # 回测结果（沪深300前30只，250日）：
  #   box_breakout: +30.02% 盈亏比1.43  ← 最优，保留
  #   turtle:       +10.98% 盈亏比2.78  ← 盈利，保留
  #   dual_ma:       +2.98% 盈亏比1.78  ← 微利，保留
  #   bollinger:     -6.85% 盈亏比1.04  ← 亏损，禁用
  #   rsi_reversal:  -5.33% 盈亏比51.41 ← 亏损（虚假高盈亏比），禁用
  enabled:
    - box_breakout
    - turtle
    - dual_ma
  # 信号融合规则：unanimous（全票通过）/ majority（多数）/ any（任一）
  signal_fusion: majority
  min_confidence: 0.6            # 最低置信度阈值
  auto_select: false             # 是否启用自动选股
  select_top_n: 50               # 全市场按资金流排序取前 N
  select_max_candidates: 10      # 最大选股数量

# ========== 风控 ==========
risk:
  max_position_ratio: 0.30       # 单股仓位上限 30%
  daily_loss_warn: 0.03          # 日亏 3% 预警
  daily_loss_halt: 0.05          # 日亏 5% 熔断
  max_total_positions: 5         # 最大持仓数
  max_same_industry: 2           # 同行业最大持仓数
  # 涨跌停/停牌自动过滤（系统默认开启，不可关闭）
  t_plus_1: true                 # T+1 限制

# ========== 执行 ==========
execution:
  mode: paper                    # backtest / paper / live
  paper:
    initial_capital: 1000000     # 模拟本金 100 万
    commission_rate: 0.00025     # 佣金费率万2.5
    stamp_tax: 0.0005            # 印花税万5（卖出，2023-08-28 起减半，P1-b 修复）
    slippage: 0.002              # 滑点 0.2%
  live:
    broker: qmt
    confirm_required: true       # 下单前人工确认

# ========== 飞书通知 ==========
feishu:
  enabled: true
  # 消息类型开关
  notify_signal: true            # 买卖信号
  notify_daily_report: true      # 每日日报
  notify_risk_alert: true        # 风控告警
  notify_backtest: true          # 回测报告
  notify_system_error: true      # 系统异常
  # 推送时段（交易日）
  daily_report_times:
    - "09:10"
    - "11:35"
    - "15:10"

# ========== 调度 ==========
scheduler:
  timezone: Asia/Shanghai
  # 交易日才执行
  trading_days_only: true
  # 盘中扫描时刻（与 scheduler.py 的 SCAN_TIMES 对应）
  scan_times:
    - "09:30"   # 开盘扫描
    - "10:30"   # 上午中段
    - "13:05"   # 午盘开盘
    - "14:30"   # 尾盘

# ========== 交易智慧 ==========
wisdom:
  skill_dir: "src/gugu/wisdom/skills"  # 项目内 skill 目录（优先）
  fallback_dirs:                       # 额外的 skill 目录（如本地 books2skill）
    - "_refs/books2skill/library/books/炒股的智慧/skills"
  skill_names:
    - stock-entry-decision
    - stock-stop-loss-decision
    - stock-position-sizing
    - stock-profit-taking-decision
    - stock-trailing-stop
    - stock-psychology-check

# ========== 基本面过滤 ==========
fundamental:
  pe_min: 0              # PE 下限（排除亏损股）
  pe_max: 100            # PE 上限（排除泡沫股）
  pb_min: 0              # PB 下限
  pb_max: 15             # PB 上限
  roe_min: 0             # ROE 下限（%，至少有盈利能力）
  revenue_growth_min: -20  # 营收增长率下限（%，排除衰退股）

# ========== 日志 ==========
log:
  level: INFO
  dir: logs
  rotation: "10 MB"
  retention: "30 days"
